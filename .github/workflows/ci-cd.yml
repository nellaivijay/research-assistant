name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run syntax check
      run: |
        python -m py_compile app.py
        echo "✅ Syntax check passed"
    
    - name: Run basic tests
      run: |
        python -c "
import sys
sys.path.insert(0, '.')
try:
    # Test basic imports
    import gradio
    import json
    import requests
    print('✅ All imports successful')
    
    # Test model configuration
    from app import ModelConfig
    model_config = ModelConfig()
    models = model_config.get_available_models()
    print(f'✅ Model configuration loaded: {len(models)} models available')
    
    print('✅ All basic tests passed')
except Exception as e:
    print(f'❌ Test failed: {e}')
    sys.exit(1)
"
    
    - name: Security check
      run: |
        echo "Checking for potential security issues..."
        if grep -r "api_key\|secret\|token" app.py | grep -v "api_key_env\|API_KEY\|get_api_key"; then
          echo "⚠️ Warning: Found hardcoded credentials"
        else
          echo "✅ No hardcoded credentials found"
        fi